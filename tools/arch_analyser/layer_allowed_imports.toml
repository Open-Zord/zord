# Configuração de allowed imports por camada para validação de dependências

[services]
allowed = [
  "internal/application/domain",
  "internal/repositories",
  "internal/application/providers",
  "internal/application/context",
  # TODO: remover quando a refatoração do UnitOfWork abstrair *sqlx.Tx
  # das interfaces de repositório expostas ao service layer.
  "github.com/jmoiron/sqlx"
]

[domain]
allowed = [] # Apenas stdlib

[repositories]
allowed = [
  "internal/application/domain",
  "github.com/fatih/structs",
  "github.com/jmoiron/sqlx",
  "github.com/go-sql-driver/mysql"
]

[providers]
allowed = [] # Apenas stdlib

[context]
allowed = [] # Apenas stdlib 